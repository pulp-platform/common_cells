      - test/cc_cdc_fifo_clearable_tb.sv
      - test/cc_fifo_tb.sv
      - test/cc_graycode_tb.sv
      - test/cc_id_queue_tb.sv
      - test/cc_passthrough_stream_fifo_tb.sv
      - test/cc_popcount_tb.sv
      - test/cc_rr_arb_tree_tb.sv
      - test/cc_stream_register_tb.sv
      - test/cc_stream_to_mem_tb.sv
      - test/cc_sub_per_hash_tb.sv
      # Level 1
      - test/cc_isochronous_crossing_tb.sv
      - test/cc_stream_omega_net_tb.sv
      - test/cc_stream_xbar_tb.sv
      - test/cc_clk_int_div_tb.sv
      - test/cc_clk_int_div_static_tb.sv
      - test/cc_clk_mux_glitch_free_tb.sv
      - test/cc_lossy_valid_to_stream_tb.sv

  - target: synth_test
    files:
      # Level 0
      - test/cc_cdc_2phase_synth.sv
      - test/cc_id_queue_synth.sv
      - test/cc_stream_arbiter_synth.sv
      - test/cc_ecc_synth.sv
      # Level 1
      - test/cc_synth_bench.sv

  # Deprecated wrappers: legacy module names that wrap the new cc_* modules.
  # Included by default for backward compatibility. Set the target 'cc_no_deprecated'
  # to exclude them and enforce use of the new cc_* names.
  - target: not(cc_no_deprecated)
    files:
      - src/deprecated/stream_intf.sv
      - src/deprecated/binary_to_gray.sv
      - src/deprecated/boxcar.sv
      - src/deprecated/cb_filter.sv
      - src/deprecated/cdc_2phase.sv
